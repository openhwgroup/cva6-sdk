image sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition "u-boot binary for HPS" {
        partition-type = 0x0C # Extended Fat32 partition
        bootable = true
        offset = 1M   # 2048 sectors
        size = 100M   # 204800 sectors
        image = "hps.vfat"
    }

    partition "OpenSBI with u-boot as payload" {
        partition-type = 0xDA # Non-FS data
        image = "fw_payload.bin"
    }

    partition "FIT image" {
        partition-type = 0x0C # Extended Fat32 partition
        image = "boot.vfat"
    }
}

image boot.vfat {
    vfat {
        file "fitImage.itb" {
            image = "fitImage.itb"
        }
    }
    size = 32M
}

image hps.vfat {
    vfat {
        file "u-boot.itb" {
            image = "../blobs/altera-u-boot.itb"
        }
        label = "HPS"
    }
    size = 1M
}
